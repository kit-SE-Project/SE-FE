name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker Image & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.vars.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: apps/se-board
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # CRA 환경변수는 빌드 타임에 주입
          build-args: |
            REACT_APP_API_ENDPOINT=${{ secrets.REACT_APP_API_ENDPOINT }}
            REACT_APP_FILE_ENDPOINT=${{ secrets.REACT_APP_FILE_ENDPOINT }}
            REACT_APP_API_FILE_ENDPOINT=${{ secrets.REACT_APP_API_FILE_ENDPOINT }}
            REACT_APP_ENDPOINT=${{ secrets.REACT_APP_ENDPOINT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            kubectl set image deployment/seboard-frontend \
              seboard-frontend=ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.image-tag }} \
              -n seboard
            kubectl rollout status deployment/seboard-frontend -n seboard --timeout=180s
