name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build Docker Image & Push to GHCR
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.vars.outputs.sha }}
      image-name: ${{ steps.vars.outputs.image_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA and lowercase image name
        id: vars
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "image_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: apps/se-board
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.sha }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:latest
          build-args: |
            REACT_APP_API_ENDPOINT=${{ secrets.REACT_APP_API_ENDPOINT }}
            REACT_APP_FILE_ENDPOINT=${{ secrets.REACT_APP_FILE_ENDPOINT }}
            REACT_APP_API_FILE_ENDPOINT=${{ secrets.REACT_APP_API_FILE_ENDPOINT }}
            REACT_APP_ENDPOINT=${{ secrets.REACT_APP_ENDPOINT }}

  deploy:
    name: Deploy to K3s
    runs-on: self-hosted
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          kubectl set image deployment/seboard-frontend \
            seboard-frontend=${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image-name }}:${{ needs.build-and-push.outputs.image-tag }} \
            -n seboard
          kubectl rollout status deployment/seboard-frontend -n seboard --timeout=180s
